<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Glömt lösenord - RayaListly</title>

  <link rel="icon" href="bilder/icon.png">
  <link rel="stylesheet" href="forgotpassword3.css">
</head>

<body>
  <!-- Övre delen av sidan med loggan -->
  <header class="topbar">
    <a href="PublicHome1.html" class="logo-link">
      <img src="bilder/logo.png" alt="RayaListly logo" class="logo">
    </a>
  </header>

  <!-- Huvudinnehåll -->
  <main class="page">
    <section class="reset-wrapper">
      <div class="reset-card">
        <span class="card-badge">Hjälp med lösenord</span>

        <h1>Glömt lösenord?</h1>
        <p class="card-text">
          Skriv in din e-postadress så skickar vi en länk för att återställa ditt lösenord.
        </p>

        <div class="form-group">
          <label for="reset-email">E-post</label>
          <input
            type="email"
            id="reset-email"
            placeholder="Skriv din e-postadress"
            autocomplete="email"
          >
        </div>

        <button id="resetBtn" class="send-btn" type="button">Skicka återställningslänk</button>

        <p id="messageBox" class="message-box hidden-message" aria-live="polite"></p>

        <a href="PublicHome1.html" class="back-link">Tillbaka till inloggning</a>
      </div>
    </section>
  </main>

  <script src="forgot.js"></script>
</body>
</html>
