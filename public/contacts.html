<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>RAYALISTLY - Contacts</title>
  <link rel="icon" href="bilder/icon.png" />

  <!-- CSS -->
  <link rel="stylesheet" href="contacts.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header class="meny-rad">
    <img src="bilder/logo.png" alt="RayaListly logo" />

    <div class="top-actions">
      <a class="btn-link" href="PrivateHome2.html">
        <button type="button" class="action-btn action-btn--back">
          <i class="fa-solid fa-arrow-left"></i>
          Back
        </button>
      </a>

      <button type="button" id="logout-btn" class="action-btn action-btn--logout">
        <i class="fa-solid fa-right-from-bracket"></i>
        Log out
      </button>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="main-layout">

    <!-- ===== FRIEND REQUESTS ===== -->
    <section class="side-box requests-section">
      <h2>
        <i class="fa-solid fa-user-plus"></i>
        Friend Requests
      </h2>

      <div id="requests-list">

        <!-- Exempel: Kalle Kula request -->
         <div class="mini-card" data-username="Kalle Kula">
            <span class="user-name">Kalle Kula</span>
            <div class="card-btns">
                <button class="accept-btn" type="button" data-action="accept">Accept</button>
                <button class="decline-btn" type="button" data-action="decline">Decline</button>
            </div>
        </div>

      </div>

      <p class="helper-text">
        Accept adds the user to your contacts. Decline removes the request.
      </p>
    </section>


    <!-- ===== SEARCH ===== -->
    <section class="search-container">

      <div class="search-bar">
        <input
          type="text"
          id="search-input"
          placeholder="Search by email or username..."
          autocomplete="off"
        />

        <button id="search-btn" type="button">
          Search <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </div>

      <div id="result-box" class="result-card" style="display: none;">
        <div class="result-left">
          <i class="fa-solid fa-circle-check"></i>
          <span id="username-display"></span>
        </div>

        <button class="add-btn" type="button" id="send-request-btn">
            <i class="fa-solid fa-paper-plane"></i> Send Request
        </button>
      </div>

      <p class="helper-text">
        Tip: Press Enter to search quickly.
      </p>
    </section>


    <!-- ===== MY CONTACTS ===== -->
    <section class="side-box contacts-section">
      <h2>
        <i class="fa-solid fa-address-book"></i>
        My Contacts
      </h2>

      <ul id="my-contacts-list"></ul>

      <div id="contacts-empty" class="empty-text">
        No contacts yet. Accept a request or search and send one.
      </div>
    </section>

  </main>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast"></div>

  <!-- JS -->
  <script src="contacts.js"></script>
  <script src="1.js"></script>

</body>
</html>
